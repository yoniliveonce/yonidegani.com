<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoni Degani — Technical Program Manager & Product Delivery Leader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  :root {
    --sand: #EEF2EA;
    --warm-white: #F7FAF4;
    --terracotta: #C4694A;
    --terracotta-light: #E8896C;
    --deep: #1E2B1A;
    --mid: #3D5235;
    --soft: #7A9470;
    --olive: #5C8050;
    --olive-light: #A8C49A;
    --sage: #6B9E6B;
    --sage-light: #8FBF8F;
    --sage-pale: #D4E8D0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--deep);
    overflow-x: hidden;
  }

  /* ---- NAV ---- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 4rem;
    background: rgba(253,250,246,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(107,158,107,0.2);
    transition: box-shadow 0.3s;
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--sage); letter-spacing: 0.02em; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid); transition: color 0.2s; }
  .nav-links a:hover { color: var(--terracotta); }
  .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
  .hamburger span { width: 25px; height: 3px; background: var(--sage); border-radius: 3px; transition: all 0.3s; }
  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(8px, 8px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

  /* ---- HERO ---- */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 7rem 4rem 4rem; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -200px; right: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(107,158,107,0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
  .hero::after { content: ''; position: absolute; bottom: -100px; left: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(122,139,90,0.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
  .hero-text { padding-right: 3rem; }
  .hero-eyebrow { display: inline-block; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage); margin-bottom: 1.5rem; padding: 0.4rem 1rem; border: 1px solid var(--sage); border-radius: 100px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 5vw, 4.5rem); line-height: 1.1; color: var(--deep); margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
  .hero h1 em { font-style: italic; color: var(--terracotta); }
  .hero-desc { font-size: 1.1rem; line-height: 1.75; color: var(--mid); font-weight: 300; max-width: 480px; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
  .hero-certs { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards; }
  .cert-badge { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em; padding: 0.3rem 0.75rem; background: rgba(107,158,107,0.12); color: var(--sage); border-radius: 100px; border: 1px solid rgba(107,158,107,0.3); }
  .hero-actions { display: flex; gap: 1rem; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
  .btn-primary { display: inline-block; padding: 0.85rem 2rem; background: var(--terracotta); color: white; text-decoration: none; border-radius: 100px; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.04em; transition: transform 0.2s, box-shadow 0.2s, background 0.2s; box-shadow: 0 4px 20px rgba(196,105,74,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(196,105,74,0.4); background: var(--terracotta-light); }
  .btn-secondary { display: inline-block; padding: 0.85rem 2rem; color: var(--mid); text-decoration: none; border-radius: 100px; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.04em; border: 1.5px solid rgba(92,74,56,0.3); transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--terracotta); color: var(--terracotta); transform: translateY(-2px); }
  .hero-image-wrap { position: relative; display: flex; justify-content: center; align-items: center; opacity: 0; animation: fadeIn 1s ease 0.5s forwards; }
  .hero-image-wrap::before { content: ''; position: absolute; width: 520px; height: 520px; background: var(--sage-pale); border-radius: 50%; z-index: 0; }
  .hero-image-wrap::after { content: ''; position: absolute; width: 490px; height: 490px; border: 2px dashed rgba(107,158,107,0.35); border-radius: 50%; z-index: 2; animation: spin 30s linear infinite; }
  .hero-photo { width: 450px; height: 450px; border-radius: 50%; object-fit: cover; position: relative; z-index: 1; box-shadow: 0 24px 60px rgba(42,33,24,0.2); }
  .hero-tag { position: absolute; background: white; border-radius: 12px; padding: 0.75rem 1.25rem; box-shadow: 0 8px 24px rgba(42,33,24,0.1); z-index: 3; font-size: 0.8rem; font-weight: 500; color: var(--deep); display: flex; align-items: center; gap: 0.5rem; }
  .hero-tag.tag-1 { bottom: 60px; left: -20px; }
  .hero-tag.tag-2 { top: 80px; right: -30px; }
  .hero-tag .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); }
  .hero-tag .dot-orange { background: var(--terracotta); }

  /* ---- STATS ---- */
  .stats { background: var(--deep); padding: 4rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; text-align: center; }
  .stat-item { padding: 1.5rem; border-right: 1px solid rgba(255,255,255,0.1); }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--sage-light); display: block; margin-bottom: 0.5rem; }
  .stat-label { font-size: 0.85rem; font-weight: 400; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; }

  /* ---- TRUSTED BY ---- */
  .trusted-by { background: var(--sand); padding: 3rem 4rem; text-align: center; }
  .trusted-by h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--deep); margin-bottom: 1rem; }
  .industries { font-size: 1rem; color: var(--mid); letter-spacing: 0.02em; }

  /* ---- SECTIONS ---- */
  section { padding: 6rem 4rem; }
  .section-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.75rem; text-align: center; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3.5vw, 2.8rem); line-height: 1.2; color: var(--deep); margin-bottom: 1rem; text-align: center; }
  .section-title em { font-style: italic; color: var(--terracotta); }
  .section-intro { font-size: 1rem; line-height: 1.75; color: var(--soft); max-width: 600px; margin: 0 auto 3.5rem; text-align: center; }

  /* ---- ABOUT ---- */
  #about { background: var(--warm-white); }
  .about-content { max-width: 900px; margin: 0 auto; }
  .about-text { font-size: 1.05rem; line-height: 1.8; color: var(--mid); margin-bottom: 3rem; text-align: center; }
  .about-text p { margin-bottom: 1.5rem; }
  .intersection-wrapper { background: var(--sand); border-radius: 20px; padding: 3rem; margin: 3rem 0; }
  .intersection-title { font-size: 0.95rem; font-weight: 500; color: var(--soft); margin-bottom: 2.5rem; text-align: center; }
  .intersection-diagram { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 700px; margin: 0 auto; }
  .intersection-item { text-align: center; }
  .intersection-icon { width: 70px; height: 70px; margin: 0 auto 1rem; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 600; color: var(--sage); box-shadow: 0 8px 20px rgba(42,33,24,0.08); border: 3px solid var(--sage-pale); font-family: 'Playfair Display', serif; }
  .intersection-item h4 { font-size: 0.95rem; font-weight: 600; color: var(--deep); }
  .about-closing { font-size: 1.05rem; line-height: 1.8; color: var(--mid); text-align: center; }

  /* ---- PERSONAL / BEYOND THE WORK ---- */
  .personal-section { margin-top: 4rem; padding-top: 4rem; border-top: 2px solid var(--sage-pale); }
  .personal-header { text-align: center; margin-bottom: 3rem; }
  .personal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--deep); margin-bottom: 1rem; }
  .personal-header h3 em { font-style: italic; color: var(--terracotta); }
  .personal-content { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
  .personal-text { font-size: 1rem; line-height: 1.8; color: var(--mid); }
  .personal-text p { margin-bottom: 1.25rem; }
  .personal-photos { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 1rem; }
  .personal-photo { border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(42,33,24,0.12); transition: transform 0.3s; }
  .personal-photo:hover { transform: translateY(-4px); }
  .personal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* Photo 1: family — top left, taller to show faces */
  .personal-photo:nth-child(1) { grid-column: 1; grid-row: 1; }
  .personal-photo:nth-child(1) img { height: 320px; }
  /* Photo 2: pool — bottom left */
  .personal-photo:nth-child(2) { grid-column: 1; grid-row: 2; }
  .personal-photo:nth-child(2) img { height: 220px; }
  /* Photo 3: B&W — right column, spans both rows full height */
  .personal-photo:nth-child(3) { grid-column: 2; grid-row: 1 / span 2; }
  .personal-photo:nth-child(3) img { height: 100%; min-height: 560px; }

  /* ---- CONTRIBUTE ---- */
  #contribute { background: var(--deep); padding: 5rem 4rem; text-align: center; }
  #contribute h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3.5vw, 2.8rem); color: white; margin-bottom: 4rem; }
  .contribute-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 1200px; margin: 0 auto; }
  .contribute-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2.5rem; text-align: left; transition: all 0.3s; }
  .contribute-card:hover { background: rgba(107,158,107,0.1); border-color: var(--sage-light); transform: translateY(-4px); }
  .contribute-card h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: white; margin-bottom: 1rem; line-height: 1.3; min-height: 80px; }
  .contribute-card p { font-size: 0.92rem; line-height: 1.75; color: rgba(255,255,255,0.7); }
  .contribute-card .solution { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); color: var(--sage-light); }

  /* ---- SERVICES ---- */
  #services { background: var(--sand); }
  .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .service-card { background: var(--warm-white); border-radius: 20px; padding: 2.5rem; position: relative; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
  .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(42,33,24,0.1); }
  .service-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--sage); }
  .service-card:nth-child(2)::before { background: var(--terracotta); }
  .service-card:nth-child(3)::before { background: var(--sage-light); }
  .service-card:nth-child(4)::before { background: var(--olive); }
  .service-icon { font-size: 2.2rem; margin-bottom: 1.25rem; display: block; }
  .service-card h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--deep); margin-bottom: 0.75rem; }
  .service-card p { font-size: 0.9rem; line-height: 1.7; color: var(--soft); }

  /* ---- EXPERIENCE ---- */
  #experience { background: var(--warm-white); }
  .timeline { position: relative; max-width: 900px; margin: 0 auto; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--sage), rgba(107,158,107,0.1)); }
  .timeline-item { padding-left: 2.5rem; margin-bottom: 3rem; position: relative; }
  .timeline-item::before { content: ''; position: absolute; left: -5px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--sage); border: 2px solid var(--warm-white); box-shadow: 0 0 0 3px rgba(107,158,107,0.25); }
  .timeline-date { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em; color: var(--sage); text-transform: uppercase; margin-bottom: 0.4rem; }
  .timeline-company { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--deep); margin-bottom: 0.25rem; }
  .timeline-role { font-size: 0.9rem; font-weight: 500; color: var(--mid); margin-bottom: 0.75rem; }
  .timeline-desc { font-size: 0.88rem; line-height: 1.7; color: var(--soft); max-width: 700px; }

  /* ---- TESTIMONIALS ---- */
  #testimonials { background: var(--sand); }
  .testimonials-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .testimonial-card { background: var(--warm-white); border-radius: 20px; padding: 2.5rem; position: relative; transition: transform 0.3s; }
  .testimonial-card:hover { transform: translateY(-4px); }
  .testimonial-card::before { content: '\201C'; font-family: 'Playfair Display', serif; font-size: 5rem; color: rgba(196,105,74,0.15); position: absolute; top: 0.5rem; left: 1.5rem; line-height: 1; }
  .testimonial-text { font-size: 0.92rem; line-height: 1.75; color: var(--mid); margin-bottom: 1.5rem; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: 0.75rem; }
  .author-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 600; color: white; flex-shrink: 0; }
  .author-name { font-size: 0.875rem; font-weight: 600; color: var(--deep); }
  .author-title { font-size: 0.78rem; color: var(--soft); }

  /* ---- CONTACT ---- */
  #contact { background: var(--deep); text-align: center; }
  #contact .section-label { color: var(--sage-light); }
  #contact .section-title { color: white; }
  #contact .section-title em { color: var(--terracotta-light); }
  #contact .section-intro { color: rgba(255,255,255,0.55); margin: 0 auto 3rem; }
  .contact-options { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
  .contact-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem 2rem; text-decoration: none; transition: all 0.3s; min-width: 200px; }
  .contact-card:hover { background: rgba(107,158,107,0.15); border-color: var(--sage-light); transform: translateY(-4px); }
  .contact-card .icon { font-size: 1.8rem; margin-bottom: 0.5rem; display: block; }
  .contact-card .label { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.25rem; display: block; }
  .contact-card .value { font-size: 0.95rem; font-weight: 500; color: white; }

  /* ---- FOOTER ---- */
  footer { background: #1A1410; padding: 2rem 4rem; display: flex; justify-content: space-between; align-items: center; }
  footer .logo { font-family: 'Playfair Display', serif; color: var(--sage-light); font-size: 1.1rem; }
  footer p { font-size: 0.78rem; color: rgba(255,255,255,0.25); }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ---- MOBILE ---- */
  @media (max-width: 900px) {
    nav { padding: 1rem 2rem; }
    .hamburger { display: flex; }
    .nav-links { position: fixed; top: 70px; right: -100%; width: 250px; height: calc(100vh - 70px); background: var(--warm-white); flex-direction: column; padding: 2rem; gap: 1.5rem; box-shadow: -4px 0 20px rgba(0,0,0,0.1); transition: right 0.3s ease; }
    .nav-links.active { right: 0; }
    .nav-links a { font-size: 1rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(107,158,107,0.2); }
    .hero { grid-template-columns: 1fr; padding: 6rem 2rem 3rem; gap: 3rem; }
    .hero-text { padding-right: 0; }
    .hero-image-wrap { order: -1; }
    .hero-photo { width: 300px; height: 300px; }
    .hero-image-wrap::before { width: 360px; height: 360px; }
    .hero-image-wrap::after { width: 340px; height: 340px; }
    .hero-tag { font-size: 0.7rem; padding: 0.5rem 0.75rem; }
    .hero-tag.tag-1 { bottom: 20px; left: 10px; }
    .hero-tag.tag-2 { top: 20px; right: 10px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 0; padding: 2rem; }
    .stat-item { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem; }
    .stat-num { font-size: 2rem; }
    section { padding: 4rem 2rem; }
    .contribute-grid { grid-template-columns: 1fr; }
    .services-grid { grid-template-columns: 1fr; }
    .intersection-diagram { grid-template-columns: 1fr; gap: 1.5rem; }
    .personal-content { grid-template-columns: 1fr; gap: 2rem; }
    .personal-photos { grid-template-columns: 1fr; }
    .personal-photo:nth-child(1), .personal-photo:nth-child(2), .personal-photo:nth-child(3) { grid-column: 1; grid-row: auto; }
    .personal-photo:nth-child(1) img, .personal-photo:nth-child(2) img, .personal-photo:nth-child(3) img { height: auto; min-height: unset; object-fit: contain; max-width: 100%; }
    .testimonials-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 2rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Yoni Degani</div>
  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="#about" onclick="closeMenu()">About</a></li>
    <li><a href="#contribute" onclick="closeMenu()">Approach</a></li>
    <li><a href="#experience" onclick="closeMenu()">Experience</a></li>
    <li><a href="#testimonials" onclick="closeMenu()">Testimonials</a></li>
    <li><a href="#contact" onclick="closeMenu()">Contact</a></li>
  </ul>
</nav>

<!-- All content is injected by JS from JSON files -->
<div id="hero-section"></div>
<div id="stats-section"></div>
<div id="about-section"></div>
<div id="contribute-section"></div>
<div id="services-section"></div>
<div id="experience-section"></div>
<div id="testimonials-section"></div>
<div id="contact-section"></div>

<footer>
  <div class="logo">Yoni Degani</div>
  <p id="footer-certs"></p>
</footer>

<script>
  // ---- HELPERS ----
  async function loadJSON(path) {
    const res = await fetch(path + '?v=' + Date.now());
    return res.json();
  }

  // ---- HERO ----
  async function renderHero() {
    const d = await loadJSON('_data/hero.json');
    document.getElementById('hero-section').innerHTML = `
      <section class="hero">
        <div class="hero-text">
          <span class="hero-eyebrow">${d.eyebrow}</span>
          <h1>${d.heading} <em>${d.heading_em}</em></h1>
          <p class="hero-desc">${d.description_1}</p>
          <p class="hero-desc">${d.description_2}</p>
          <div class="hero-certs">
            ${d.certifications.map(c => `<span class="cert-badge">${c}</span>`).join('')}
          </div>
          <div class="hero-actions">
            <a href="#contact" class="btn-primary">${d.cta_primary}</a>
            <a href="#experience" class="btn-secondary">${d.cta_secondary}</a>
          </div>
        </div>
        <div class="hero-image-wrap">
          <img class="hero-photo" src="${d.photo}" alt="Yoni Degani" style="object-position: ${d.photo_position}">
          <div class="hero-tag tag-1"><span class="dot"></span>${d.tag_1}</div>
          <div class="hero-tag tag-2"><span class="dot dot-orange"></span>${d.tag_2}</div>
        </div>
      </section>`;
  }

  // ---- STATS ----
  async function renderStats() {
    const d = await loadJSON('_data/stats.json');
    document.getElementById('stats-section').innerHTML = `
      <div class="stats">
        ${d.stats.map(s => `
          <div class="stat-item">
            <span class="stat-num">${s.number}</span>
            <span class="stat-label">${s.label}</span>
          </div>`).join('')}
      </div>
      <div class="trusted-by">
        <h2>${d.industry_title}</h2>
        <p class="industries">${d.industries}</p>
      </div>`;
  }

  // ---- ABOUT ----
  async function renderAbout() {
    const d = await loadJSON('_data/about.json');
    const photosHTML = d.photos.map(p => `
      <div class="personal-photo ${p.size === 'large' ? 'large' : ''}">
        <img src="${p.src}" alt="${p.alt}" style="object-position: ${p.position}">
      </div>`).join('');

    document.getElementById('about-section').innerHTML = `
      <section id="about">
        <div class="section-label">About Me</div>
        <div class="about-content">
          <div class="about-text">
            <p>${d.paragraph_1}</p>
            <p>${d.paragraph_2}</p>
          </div>
          <div class="intersection-wrapper">
            <p class="intersection-title">My work typically sits at the intersection of:</p>
            <div class="intersection-diagram">
              <div class="intersection-item"><div class="intersection-icon">PS</div><h4>Product Strategy</h4></div>
              <div class="intersection-item"><div class="intersection-icon">OA</div><h4>Organizational Alignment</h4></div>
              <div class="intersection-item"><div class="intersection-icon">EE</div><h4>Engineering Execution</h4></div>
            </div>
          </div>
          <p class="about-closing">${d.closing}</p>
          <div class="personal-section reveal">
            <div class="personal-header">
              <h3>Beyond <em>the work</em></h3>
            </div>
            <div class="personal-content">
              <div class="personal-text">
                <p>${d.beyond_p1}</p>
                <p>${d.beyond_p2}</p>
                <p>${d.beyond_p3}</p>
              </div>
              <div class="personal-photos">${photosHTML}</div>
            </div>
          </div>
        </div>
      </section>`;
  }

  // ---- EXPERIENCE ----

  // ---- TESTIMONIALS ----
  async function renderTestimonials() {

  // ---- CONTACT ----
  async function renderContact() {
    const d = await loadJSON('_data/contact.json');
    document.getElementById('contact-section').innerHTML = `
      <section id="contact">
        <div class="section-label">Get In Touch</div>
        <h2 class="section-title">${d.title}</h2>
        <p class="section-intro">${d.intro}</p>
        <div class="contact-options">

          </a>
          <a href="tel:${d.phone}" class="contact-card">
            <span class="icon">📞</span>
            <span class="label">Phone</span>
            <span class="value">${d.phone}</span>
          </a>
          <a href="${d.linkedin}" target="_blank" class="contact-card">
            <span class="icon">💼</span>
            <span class="label">LinkedIn</span>
            <span class="value">linkedin.com/in/yoni-degani</span>
          </a>

  // ---- INIT ----
  async function init() {
    await Promise.all([
      renderHero(),
      renderStats(),
      renderAbout(),
      renderContribute(),
      renderServices(),
      renderExperience(),
      renderTestimonials(),
      renderContact()
    ]);

    // Scroll reveal (re-run after dynamic content loads)
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(el => observer.observe(el));
  }

  init();

  // Nav
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('active');
    document.querySelector('.hamburger').classList.toggle('active');
  }
  function closeMenu() {
    document.getElementById('navLinks').classList.remove('active');
    document.querySelector('.hamburger').classList.remove('active');
  }
  window.addEventListener('scroll', () => {
    document.querySelector('nav').style.boxShadow = window.scrollY > 50 ? '0 4px 20px rgba(0,0,0,0.08)' : 'none';
  });
</script>
